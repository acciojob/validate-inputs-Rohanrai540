	<h2>Form Validation</h2>

Name:
<input type="text" onkeyup="validateInput(this,'^[A-Za-z]{3,}$')">

Email:
<input type="text" onkeyup="validateInput(this,'^[a-z0-9._%+-]+@[a-z0-9.-]+\\.[a-z]{2,}$')">
<br><br>

Mobile:
<input type="text" onkeyup="validateInput(this,'^[0-9]{10}$')">
